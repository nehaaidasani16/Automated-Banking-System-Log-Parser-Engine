
<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;font-family:'Courier New',monospace;padding:16px;min-height:100vh;display:flex;align-items:flex-start;justify-content:center}
.terminal{background:#1a1a1a;border-radius:12px;overflow:hidden;width:100%;max-width:620px;box-shadow:0 8px 32px rgba(0,0,0,.6)}
.topbar{background:#2d2d2d;padding:10px 16px;display:flex;align-items:center;gap:8px}
.dot{width:12px;height:12px;border-radius:50%}
.filename{color:#888;font-size:12px;margin-left:8px}
.body{padding:18px 20px;font-size:13px;line-height:1.85;min-height:340px}
.line{opacity:0;transform:translateY(4px);transition:opacity .3s ease,transform .3s ease;white-space:pre-wrap;word-break:break-all}
.line.show{opacity:1;transform:translateY(0)}
.prompt{color:#4ade80}
.cmd{color:#e8e8e8}
.info{color:#60a5fa}
.engine{color:#a78bfa}
.ok{color:#4ade80}
.warn{color:#facc15}
.err{color:#f87171}
.dim{color:#6b7280}
.result{color:#67e8f9}
.sep{color:#374151}
.bold{font-weight:700}
.cursor{display:inline-block;width:8px;height:14px;background:#4ade80;margin-left:2px;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.btn{background:#2563eb;color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:12px;font-family:inherit;cursor:pointer;margin:12px 20px 16px;display:block;transition:background .2s}
.btn:hover{background:#1d4ed8}
.progress{height:3px;background:#2563eb;width:0;transition:width .1s linear;border-radius:0 0 0 0}
</style>
</head>
<body>
<div class="terminal">
  <div class="topbar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#ffbd2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span class="filename">log_engine.py — Banking Log Parser Engine</span>
  </div>
  <div class="progress" id="prog"></div>
  <div class="body" id="body">
    <div class="line show"><span class="prompt">$</span> <span class="cmd">python log_engine.py</span><span class="cursor" id="cur"></span></div>
  </div>
  <button class="btn" id="btn" onclick="runDemo()">▶ Run Demo</button>
</div>

<script>
const lines = [
  {t:600,  cls:'sep',    txt:'════════════════════════════════════════'},
  {t:700,  cls:'engine', txt:'     Banking Log Parser Engine'},
  {t:800,  cls:'sep',    txt:'════════════════════════════════════════'},
  {t:1100, cls:'info',   txt:'\n[DB]     Connected to banking_errors.db'},
  {t:1400, cls:'info',   txt:'[DB]     Table banking_errors ready'},
  {t:1700, cls:'info',   txt:'[ENGINE] Reading bank_gateway.log ...\n'},
  {t:2100, cls:'dim',    txt:'[LINE 1]  INFO  row — skipped'},
  {t:2500, cls:'ok',     txt:'[LINE 2]  ERROR captured → CoreSettlementEngine ✓'},
  {t:2900, cls:'dim',    txt:'[LINE 3]  WARNING row — skipped'},
  {t:3300, cls:'warn',   txt:'[LINE 4]  ⚠  DATA QUALITY ALERT — malformed row, skipping safely'},
  {t:3700, cls:'ok',     txt:'[LINE 5]  ERROR captured → PaymentAPI ✓'},
  {t:4000, cls:'dim',    txt:'  ...'},
  {t:4300, cls:'ok',     txt:'[LINE 203] ERROR captured → RiskManagementModule ✓\n'},
  {t:4700, cls:'info',   txt:'[ENGINE] File read complete. Committing to database...'},
  {t:5100, cls:'ok',     txt:'[DB]     203 records committed ✓\n'},
  {t:5400, cls:'sep',    txt:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'},
  {t:5500, cls:'result', txt:'[RESULT] Run complete.'},
  {t:5600, cls:'ok',     txt:'[RESULT] Errors inserted   : 203'},
  {t:5700, cls:'warn',   txt:'[RESULT] Corrupted skipped : 6'},
  {t:5800, cls:'ok',     txt:'[RESULT] Program crashes   : 0'},
  {t:5900, cls:'sep',    txt:'━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n'},
  {t:6200, cls:'result', txt:'  ╔═══════════════════════════════════════╗'},
  {t:6300, cls:'result', txt:'  ║     ERROR REPORT BY SERVICE           ║'},
  {t:6400, cls:'result', txt:'  ╠═══════════════════════════════════════╣'},
  {t:6550, cls:'err',    txt:'  ║  CoreSettlementEngine   │  51 error(s) ║'},
  {t:6700, cls:'err',    txt:'  ║  AuthService            │  46 error(s) ║'},
  {t:6850, cls:'err',    txt:'  ║  FixOrderGateway        │  39 error(s) ║'},
  {t:7000, cls:'err',    txt:'  ║  RiskManagementModule   │  36 error(s) ║'},
  {t:7150, cls:'err',    txt:'  ║  PaymentAPI             │  31 error(s) ║'},
  {t:7300, cls:'result', txt:'  ╚═══════════════════════════════════════╝\n'},
  {t:7600, cls:'info',   txt:'[ENGINE] Database connection closed. Done.\n'},
  {t:7800, cls:'prompt', txt:'$ ▊'},
];

function runDemo(){
  const body = document.getElementById('body');
  const btn  = document.getElementById('btn');
  const cur  = document.getElementById('cur');
  const prog = document.getElementById('prog');
  btn.disabled = true; btn.textContent = '⏳ Running...';
  cur.style.display = 'none';
  const total = lines[lines.length-1].t + 400;
  lines.forEach(l => {
    setTimeout(() => {
      const d = document.createElement('div');
      d.className = 'line ' + l.cls;
      d.textContent = l.txt;
      body.appendChild(d);
      requestAnimationFrame(() => { d.classList.add('show'); });
      body.scrollTop = body.scrollHeight;
      prog.style.width = ((l.t / total) * 100) + '%';
    }, l.t);
  });
  setTimeout(() => {
    prog.style.width = '100%';
    btn.textContent = '↺ Run Again';
    btn.disabled = false;
    btn.onclick = () => location.reload();
  }, total);
}
</script>
</body>
</html>
